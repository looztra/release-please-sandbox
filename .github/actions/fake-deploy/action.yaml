---
name: Fake deploy
description: >-
  Simulates deploying an image to an environment by reporting the deployed
  commit and fake image reference to the step summary. No real artifact is
  built or deployed in this sandbox. The GitHub environment itself is
  selected by the calling job ('environment:' is job-level only); the
  'environment' input is display-only.

inputs:
  environment:
    description: Display name of the target environment (e.g. stg, prod).
    required: true
  image-tag:
    description: >-
      Tag of the fake image being deployed (e.g. 'sha-<sha>' for staging
      images, 'vX.Y.Z' for retagged release images).
    required: true
  commit-sha:
    description: The commit the deployed image corresponds to.
    required: true
  commit-message:
    description: >-
      Message of the deployed commit; when provided, its first line is added
      to the step summary.
    required: false
    default: ''
  note:
    description: >-
      Explanation appended to the step summary as a blockquote (may span
      multiple lines).
    required: true

runs:
  using: composite
  steps:
    - name: Report deployed commit
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        NOTE: ${{ inputs.note }}
        FAKE_IMAGE: ghcr.io/${{ github.repository }}
      run: |
        {
          echo "## 🚀 Fake deployment to \`${ENVIRONMENT}\`"
          echo ""
          echo "| What | Value |"
          echo "| ---- | ----- |"
          echo "| Commit | \`${COMMIT_SHA}\` |"
          if [[ -n "${COMMIT_MESSAGE}" ]]; then
            echo "| Commit message | ${COMMIT_MESSAGE%%$'\n'*} |"
          fi
          echo "| Fake image deployed | \`${FAKE_IMAGE}:${IMAGE_TAG}\` |"
          echo ""
          while IFS= read -r line; do
            echo "> ${line}"
          done <<< "${NOTE}"
        } >> "$GITHUB_STEP_SUMMARY"
