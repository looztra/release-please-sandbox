---
name: Code checks
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-checks
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is-release-please-merge: ${{ steps.detect.outputs.is-release-please-merge }}

    steps:
      - name: Checkout current branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect release-please merge commit
        id: detect
        uses: ./.github/actions/detect-release-please-merge

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: ${{ vars.MISE_CACHE_ENABLED || 'true' }}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0' }}
          version: ${{ vars.MISE_VERSION }}

      - name: Run pre-commit checks
        run: |
          echo "::group::Run pre-commit checks"
          mise run precommit:run
          echo "::endgroup::"

  fake-build:
    name: Fake app + docker build
    needs: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout current branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fake app + docker build
        uses: ./.github/actions/fake-build
        with:
          commit-sha: ${{ github.sha }}
          commit-message: ${{ github.event.head_commit.message }}
          push-image: ${{ needs.pre-commit.outputs.is-release-please-merge != 'true' }}
