---
name: Deploy to staging
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-release-please:
    name: Check for release-please merge commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is-release-please-merge: ${{ steps.detect.outputs.is-release-please-merge }}
    steps:
      - name: Checkout current branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect release-please merge commit
        id: detect
        uses: ./.github/actions/detect-release-please-merge

  deploy-stg:
    name: Fake deploy to stg
    needs: check-release-please
    # A release-please merge commit only bumps changelog/version files: the
    # code it carries was already deployed to stg by the previous push.
    if: needs.check-release-please.outputs.is-release-please-merge != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: stg
    steps:
      - name: Report deployed commit
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          FAKE_IMAGE: ghcr.io/${{ github.repository }}
        run: |
          {
            echo "## 🚀 Fake deployment to \`stg\`"
            echo ""
            echo "| What | Value |"
            echo "| ---- | ----- |"
            echo "| Triggering commit | \`${COMMIT_SHA}\` |"
            echo "| Commit message | ${COMMIT_MESSAGE%%$'\n'*} |"
            echo "| Fake image deployed | \`${FAKE_IMAGE}:sha-${COMMIT_SHA}\` |"
            echo ""
            echo "> No real artifact is built in this sandbox: this simulates"
            echo "> deploying the image built for this exact commit to staging."
          } >> "$GITHUB_STEP_SUMMARY"
